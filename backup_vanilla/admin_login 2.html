<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBD HQ | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --navy: #0A192F;
            --gold: #C5A059;
            --white: #FFFFFF;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #050b14 0%, #0a192f 100%); /* Darker for admin */
            color: var(--white);
            font-family: 'Inter', sans-serif;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(197, 160, 89, 0.3); /* Gold border for admin */
            text-align: center;
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo-text { font-size: 24px; font-weight: 700; color: var(--gold); }
        .logo-sub { font-size: 24px; font-weight: 300; }

        h2 { margin-bottom: 10px; font-size: 20px; }
        p { color: #8892b0; font-size: 14px; margin-bottom: 25px; }

        .auth-form { text-align: left; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--gold); text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--gold); }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-auth:hover { background: #b08d4a; }
        .badge {
            background-color: var(--gold);
            color: var(--navy);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-box">
                <span class="logo-text">KBD</span><span class="logo-sub">HQ <span class="badge">SECURE</span></span>
            </div>
            
            <div id="login-section">
                <h2>Admin Login</h2>
                <p>Global Hub Access.</p>
                <form class="auth-form" id="login-form">
                    <div class="form-group">
                        <label>Admin Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Command Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-auth">Enter HQ</button>
                    <div style="margin-top:20px; font-size:12px; color:#8892b0; text-align:center;">
                        Not an admin? <a href="connector_login.html" style="color:var(--gold);">Partner Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fnbtwjjjlvfuigraurjq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuYnR3ampqbHZmdWlncmF1cmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDMwMDMsImV4cCI6MjA5MTY3OTAwM30.7mxR6zQAGmBLyxD3KfouOxYxz0GcL-TcDTlATLSDH_o';
        const kbdSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-auth');
            btn.innerText = 'Authenticating...';
            btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await kbdSupabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert(error.message);
                btn.innerText = 'Enter HQ';
                btn.disabled = false;
            } else {
                // FETCH ROLE and REDIRECT
                const { data: profile, error: pError } = await kbdSupabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (pError || !profile || profile.role !== 'admin') {
                    await kbdSupabase.auth.signOut();
                    alert("Access Denied: Admin credentials required.");
                    btn.innerText = 'Enter HQ';
                    btn.disabled = false;
                } else {
                    window.location.href = 'admin_dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
