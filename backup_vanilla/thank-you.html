<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received | KBD Credit Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>
        :root {
            --navy: #0A192F;
            --navy-light: #112240;
            --gold: #C5A059;
            --gold-hover: #d4b26f;
            --success: #10b981;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--bg-body) 0%, #e2e8f0 100%);
            color: var(--text-dark); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .header { position: absolute; top: 0; left: 0; width: 100%; padding: 24px 40px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--gold); }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            margin: 20px;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: var(--success);
            animation: pulse 2s infinite ease-in-out;
        }

        .icon-wrapper svg {
            width: 48px;
            height: 48px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 15px;
        }

        p.message {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            width: 100%;
            margin: 30px 0;
            position: relative;
        }

        .divider::after {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 15px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: #25D366; /* WhatsApp Green */
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            background: #1ebc59;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .return-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s;
        }

        .return-link:hover {
            color: var(--navy);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <i data-feather="grid" style="color:var(--gold); width:28px; height:28px;"></i>
            KBD <span>Credit</span>
        </div>
    </header>

    <div class="success-card">
        <div class="icon-wrapper">
            <i data-feather="check"></i>
        </div>
        
        <h1>Application Secured</h1>
        <p class="message" id="dynamicMessage">Our executive team has received your file. <strong>We will connect with you shortly</strong> to begin the approval process.</p>
        
        <div class="divider"></div>

        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 15px; font-weight: 500;">
            Want to fast-track your case? Speak to an agent immediately:
        </p>
        <a href="#" id="wa-btn" class="whatsapp-btn">
            <i data-feather="message-circle"></i> Chat on WhatsApp
        </a>

        <a href="https://kbdcreditsolutions.com" class="return-link">← Return to Homepage</a>
    </div>

    <script>
        feather.replace();

        // Retrieve URL params if we passed them from the form
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || '';
        const rawText = urlParams.get('msg') || "Hi KBD Team, I just submitted an application on your website and would like to check my status.";

        const WA_NUMBER = "+916360681493";
        const encodedText = encodeURIComponent(rawText);
        
        document.getElementById('wa-btn').href = `https://wa.me/${WA_NUMBER}?text=${encodedText}`;

        if(name) {
            document.getElementById('dynamicMessage').innerHTML = `Thanks, <strong>${name}</strong>! Our executive team has received your file. We will connect with you shortly to begin the approval process.`;
        }
    </script>
</body>
</html>
