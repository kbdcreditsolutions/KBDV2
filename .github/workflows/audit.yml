name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight via UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run npm audit
        run: npm audit
